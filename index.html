<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>COMBOX | Exclusive Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

<div id="splash">
    <div class="splash-content">
        <h1 class="splash-logo">COMBOX</h1>
        <div class="spinner"></div>
    </div>
</div>

<header>
    <div class="top-bar">EXCLUSIVE EXPERIENCE • 2026</div>
    <h1 id="brandName">COMBOX</h1>
    <div class="nav-icons">
        <button onclick="cambiarSede()"><i class="fa fa-shop"></i></button>
        <a id="btnWS" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a id="btnIG" target="_blank"><i class="fab fa-instagram"></i></a>
    </div>
</header>

<main>
    <div class="dynamic-island">
        <div class="search-bar">
            <i class="fa fa-search"></i>
            <input type="text" id="searchInput" placeholder="Buscar..." oninput="render()">
        </div>
        <div id="typeSelector" class="scroll-x"></div>
    </div>
    
    <div id="subcatContainer" class="scroll-x subcats"></div>

    <div id="productGrid" class="grid"></div>
</main>

<div id="cartFloating" class="cart-pill">
    <div class="info">
        <span id="floatCount">0</span>
        <span id="floatTotal">$0.00</span>
    </div>
    <button onclick="toggleModal(true)">VER PEDIDO</button>
</div>

<div id="sedeModal" class="overlay">
    <div class="modal">
        <h3>Selecciona tu Sede</h3>
        <div id="sedeList"></div>
    </div>
</div>

<div id="cartModal" class="overlay">
    <div class="modal">
        <div id="step-1" class="step active">
            <h3>Tu Pedido</h3>
            <div id="cartItems"></div>
            <button class="btn-main" onclick="goToStep(2)">CONTINUAR</button>
            <button class="btn-close" onclick="toggleModal(false)">Cerrar</button>
        </div>
        <div id="step-2" class="step">
            <h3>Finalizar</h3>
            <input type="text" id="userName" placeholder="Tu nombre">
            <div class="delivery-btns">
                <button id="btnTienda" onclick="setDelivery('tienda')" class="active">Tienda</button>
                <button id="btnDelivery" onclick="setDelivery('delivery')">Delivery</button>
            </div>
            <button class="btn-main" onclick="sendWhatsApp()">PEDIR POR WHATSAPP</button>
            <button class="btn-close" onclick="goToStep(1)">Volver</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="script.js"></script>
</body>
</html>
