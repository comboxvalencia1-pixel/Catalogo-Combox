<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COMBOX | Catálogo Dinámico</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body oncontextmenu="return false;">

<div id="splash">
    <img src="logo_white.png" class="pulse-logo" id="splashLogo">
</div>

<header id="mainHeader">
    <div class="top-bar" id="topBar">COMBOX • SELECCIONA SEDE</div>
    <div class="header-content">
        <img src="logo_white.png" alt="Logo" class="header-logo">
    </div>
    <div class="header-buttons">
        <button onclick="showSedes()"><i class="fa-solid fa-shop"></i></button>
        <button onclick="showHorarios()"><i class="fa-solid fa-clock"></i></button>
        <a id="linkWS" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
        <a id="linkIG" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        <a id="linkMap" target="_blank"><i class="fa-solid fa-location-dot"></i></a>
    </div>
</header>

<main>
    <div class="island-master" id="searchIsland">
        <div class="island-top">
            <div class="search-box" onclick="expandSearch()">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Buscar producto..." oninput="filterProducts()">
            </div>
            <div id="typeButtons" class="type-selector">
                </div>
        </div>
        <div id="subcatContainer" class="subcategories-pills">
            </div>
    </div>

    <section id="promoSection">
        <h2 class="section-title">PROMOCIONES ACTIVAS</h2>
        <div class="promo-carousel" id="promoCarousel"></div>
    </section>

    <div id="productContainer">
        </div>
</main>

<div id="bottomIsland" class="liquid-glass-island">
    <div class="island-cart-info">
        <span id="cartTotal" class="neon-price">$0.00</span>
        <span id="cartCount" class="cart-subtitle">0 productos</span>
    </div>
    <button class="btn-ver-pedido" onclick="openCart()">VER PEDIDO</button>
</div>

<div id="cartModal" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-header">
            <h3>TU PEDIDO</h3>
            <button class="close-btn" onclick="closeModal('cartModal')"><i class="fa-solid fa-circle-xmark"></i></button>
        </div>
        <div id="cartItemsList" class="cart-items-container"></div>
        <div class="cart-footer">
            <div class="subtotal-row">
                <span>Subtotal:</span>
                <span id="modalTotal" class="red-total">$0.00</span>
            </div>
            <button class="btn-confirm" onclick="showDeliveryOptions()">CONFIRMAR PEDIDO</button>
            <button class="btn-empty" onclick="clearCart()">Vaciar Carrito</button>
        </div>
    </div>
</div>

<div id="deliveryModal" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-header">
            <button class="back-btn" onclick="backToCart()"><i class="fa-solid fa-arrow-left"></i></button>
            <h3>ENTREGA</h3>
        </div>
        <div class="delivery-options">
            <button id="btnStore" class="delivery-btn active" onclick="selectMethod('tienda')">
                <i class="fa-solid fa-shop"></i> Recoger en tienda
            </button>
            <button id="btnDelivery" class="delivery-btn" onclick="selectMethod('delivery')">
                <i class="fa-solid fa-motorcycle"></i> Delivery
            </button>
        </div>
        
        <div id="deliveryFields" class="form-fields">
            <div id="storeInfo">
                <p>Predeterminado: <b id="currentSedeName">Naguanagua</b></p>
                <input type="text" id="clientName" placeholder="Nombre del cliente">
            </div>
            <div id="deliveryInfo" style="display:none;">
                <div class="gps-input-group">
                    <button class="btn-gps" onclick="getLocation()"><i class="fa-solid fa-location-crosshairs"></i> Aquí</button>
                    <input type="text" id="locationLink" placeholder="Link de Google Maps o Referencia">
                </div>
                <input type="text" id="receiverName" placeholder="Nombre de quien recibe">
            </div>
        </div>
        
        <button id="btnWhatsApp" class="btn-final-wa" disabled onclick="finalizarPedido()">PEDIR POR WHATSAPP</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
