<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COMBOX | Catálogo Exclusivo</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    :root { 
      --primary: #e31b23; 
      --secondary: #1a1a1a; 
      --gray-border: #eaeef2;
    }
    body { background-color: #ffffff; font-family: 'Inter', sans-serif; }

    /* Barra de Tasa BCV */
    .bcv-badge {
      background: #f8f9fa;
      color: #767676; font-size: 10px; text-align: center; padding: 8px 0;
      letter-spacing: 1.5px; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid var(--gray-border);
    }

    /* Encabezado */
    .header-main { padding: 40px 0 30px; text-align: center; }
    .logo { font-size: 4rem; font-weight: 900; color: var(--primary); letter-spacing: -2px; margin-bottom: 20px; }

    /* Botones de Contacto */
    .contact-nav { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .btn-contact {
      color: #2d2d2d; text-decoration: none; font-size: 12px; font-weight: 700;
      padding: 10px 20px; border-radius: 50px; border: 1.5px solid var(--gray-border);
      display: flex; align-items: center; gap: 8px; transition: 0.3s;
    }
    .btn-contact:hover { background: var(--primary); color: #fff; border-color: var(--primary); transform: translateY(-3px); }

    /* Filtros */
    .filter-bar { 
      display: flex; gap: 10px; overflow-x: auto; padding: 15px; position: sticky; top: 0; 
      background: white; z-index: 1000; border-bottom: 1px solid var(--gray-border);
    }
    .btn-filter { 
      background: #f1f1f1; border: none; border-radius: 50px; padding: 8px 20px; 
      font-weight: 700; font-size: 12px; white-space: nowrap;
    }
    .btn-filter.active { background: var(--primary); color: white; }

    /* Tarjetas de Producto */
    .card { border: 1px solid var(--gray-border); border-radius: 20px; transition: 0.3s; height: 100%; overflow: hidden; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .img-box { height: 200px; padding: 20px; display: flex; align-items: center; justify-content: center; }
    .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .product-name { font-weight: 700; font-size: 14px; text-align: center; padding: 0 10px; min-height: 40px; }
    
    .btn-pedir {
      display: block; background: #000; color: white; text-align: center;
      text-decoration: none; font-weight: 700; padding: 12px; margin: 15px; border-radius: 12px;
    }
    #loader { text-align: center; padding: 100px; }
  </style>
</head>
<body>

  <div class="bcv-badge"><i class="fas fa-bolt"></i> Precios Tasa BCV Oficial <i class="fas fa-bolt"></i></div>

  <div class="header-main">
    <h1 class="logo">COMBOX</h1>
    <div class="contact-nav">
      <a href="https://wa.me/584244701273" target="_blank" class="btn-contact">
        <i class="fab fa-whatsapp"></i> WhatsApp
      </a>
      <a href="https://www.instagram.com/combox.valencia/" target="_blank" class="btn-contact">
        <i class="fab fa-instagram"></i> Instagram
      </a>
      <a href="https://maps.app.goo.gl/J8ZJq68xdKAGYZEz8?g_st=ic" target="_blank" class="btn-contact">
        <i class="fas fa-map-marker-alt"></i> Ubicación
      </a>
    </div>
  </div>

  <div id="filter-bar" class="filter-bar d-none">
    <button class="btn-filter active" onclick="cambiarFiltro('Todas', this)">Todas</button>
  </div>

  <div class="container py-4">
    <div id="grid" class="row g-4"></div>
    <div id="loader">
      <div class="spinner-border text-danger"></div>
      <p class="mt-2">Cargando licores...</p>
    </div>
  </div>

  <script>
    // TU LINK MAESTRO CON EL "APELLIDO" PARA PRODUCTOS
    const API_URL = "https://script.google.com/macros/s/AKfycbwBSKJ8SJCZKLaDC15TLOwo5yq3a8lzkW_VIiCojWTsCCvCz4N_HfDKHDIENibTA6BT/exec?action=getProducts";
    const TEL_WHATSAPP = "584244701273";

    let productosBase = [];

    async function cargarCatalogo() {
      try {
        const res = await fetch(API_URL);
        productosBase = await res.json();
        
        document.getElementById('loader').style.display = 'none';
        document.getElementById('filter-bar').classList.remove('d-none');
        
        generarFiltros();
        renderizar(productosBase);
      } catch (err) {
        document.getElementById('loader').innerHTML = "Error al cargar productos. Revisa tu script.";
      }
    }

    function generarFiltros() {
      const categorias = [...new Set(productosBase.map(p => p.categoria))].sort();
      const fBar = document.getElementById('filter-bar');
      categorias.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'btn-filter';
        btn.innerText = cat;
        btn.onclick = (e) => cambiarFiltro(cat, e.target);
        fBar.appendChild(btn);
      });
    }

    function cambiarFiltro(cat, el) {
      document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      const filtrados = cat === 'Todas' ? productosBase : productosBase.filter(p => p.categoria === cat);
      renderizar(filtrados);
    }

    function renderizar(lista) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      lista.forEach(p => {
        grid.innerHTML += `
          <div class="col-6 col-md-4 col-lg-3">
            <div class="card">
              <div class="img-box">
                <img src="${p.imagen || 'https://via.placeholder.com/200'}" alt="${p.nombre}">
              </div>
              <div class="product-name">${p.nombre}</div>
              <a href="https://wa.me/${TEL_WHATSAPP}?text=Hola! Me interesa: ${encodeURIComponent(p.nombre)}" target="_blank" class="btn-pedir">
                PEDIR <i class="fab fa-whatsapp"></i>
              </a>
            </div>
          </div>`;
      });
    }

    window.onload = cargarCatalogo;
  </script>
</body>
</html>
