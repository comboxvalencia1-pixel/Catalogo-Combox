<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COMBOX | Catálogo Exclusivo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { 
      --primary: #e31b23; 
      --primary-dark: #b01017;
      --primary-light: #ff6b6b;
      --secondary: #1a1a1a;
      --text-dark: #2d2d2d;
      --text-light: #767676;
      --gray-light: #f8f9fa;
      --gray-border: #eaeef2;
      --shadow-sm: 0 5px 20px rgba(0, 0, 0, 0.02);
      --shadow-md: 0 15px 30px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 20px 40px rgba(227, 27, 35, 0.15);
      --black: #000000;
      --black-light: #333333;
      --black-dark: #1a1a1a;
    }
    
    body { 
      background-color: #ffffff; 
      font-family: 'Inter', sans-serif; 
      margin: 0; 
      -webkit-font-smoothing: antialiased;
      color: var(--text-dark);
    }

    /* Badge BCV */
    .bcv-badge {
      background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
      color: var(--text-light);
      font-size: 10px;
      text-align: center;
      padding: 8px 0;
      letter-spacing: 1.5px;
      font-weight: 600;
      text-transform: uppercase;
      border-bottom: 1px solid var(--gray-border);
      position: relative;
      overflow: hidden;
    }

    .bcv-badge::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      animation: shine 8s infinite;
    }

    @keyframes shine { to { left: 100%; } }

    .header-main {
      background: #ffffff;
      padding: 20px 0 30px;
      text-align: center;
      position: relative;
    }

    .subtitle {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-light);
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-bottom: 5px;
      opacity: 0.4;
    }

    @keyframes float-logo {
      0% { transform: translateY(0px); text-shadow: 0 5px 20px rgba(227, 27, 35, 0.2); }
      50% { transform: translateY(-5px); text-shadow: 0 15px 30px rgba(227, 27, 35, 0.3); }
      100% { transform: translateY(0px); text-shadow: 0 5px 20px rgba(227, 27, 35, 0.2); }
    }

    .logo { 
      font-size: 5rem; 
      font-weight: 900; 
      letter-spacing: -3px; 
      margin: 0; 
      line-height: 0.9;
      color: var(--primary);
      animation: float-logo 4s ease-in-out infinite;
    }

    .contact-nav { 
      margin-top: 25px; 
      display: flex; 
      justify-content: center; 
      gap: 15px; 
      flex-wrap: wrap;
    }
    
    .btn-contact {
      color: var(--text-dark);
      text-decoration: none;
      font-size: 11px;
      font-weight: 700;
      padding: 10px 22px; 
      border-radius: 50px;
      background: #ffffff;
      border: 1.5px solid var(--gray-border);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: 0.3s;
      text-transform: uppercase;
      box-shadow: var(--shadow-sm);
    }
    
    .btn-contact:hover { 
      background: var(--primary); 
      color: #fff; 
      transform: translateY(-3px);
      border-color: var(--primary);
    }

    .filter-bar { 
      display: flex; 
      gap: 10px; 
      overflow-x: auto; 
      padding: 25px 20px; 
      position: sticky; 
      top: 0; 
      background: rgba(255, 255, 255, 0.85); 
      backdrop-filter: blur(20px);
      z-index: 1000; 
      scrollbar-width: none;
      border-bottom: 1px solid rgba(234, 238, 242, 0.5);
    }
    
    .btn-filter { 
      background: transparent; 
      color: var(--text-light); 
      border: 2px solid transparent; 
      border-radius: 50px; 
      padding: 8px 22px; 
      font-weight: 700; 
      font-size: 12px;
      transition: 0.3s;
      white-space: nowrap;
    }

    .btn-filter.active { 
      background: var(--primary); 
      color: #fff; 
      box-shadow: 0 8px 20px rgba(227, 27, 35, 0.25); 
    }

    .card { 
      border: 1px solid var(--gray-border); 
      border-radius: 24px; 
      background: #fff;
      transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .card:hover { transform: translateY(-8px); box-shadow: var(--shadow-md); }
    
    .img-box { 
      height: 180px; 
      padding: 20px; 
      display: flex; 
      align-items: center; 
      justify-content: center;
    }

    .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; transition: 0.5s; }
    .card:hover .img-box img { transform: scale(1.08); }
    
    .product-name { 
      font-weight: 700; 
      font-size: 13px; 
      text-align: center; 
      margin: 15px 20px 10px; 
      min-height: 40px;
    }
    
    .btn-pedir {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--black), var(--black-light));
      color: white;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 20px;
      margin: 5px 20px 20px 20px;
      border-radius: 50px;
      transition: 0.3s;
    }

    .btn-pedir:hover { background: var(--black-dark); transform: translateY(-2px); }

    #loader { text-align: center; padding: 80px; color: var(--primary); }
  </style>
</head>
<body>

  <div class="bcv-badge">
    <i class="fas fa-bolt"></i> Precios sujetos a la tasa BCV oficial <i class="fas fa-bolt"></i>
  </div>

  <div class="header-main">
    <div class="subtitle">Catálogo exclusivo</div>
    <h1 class="logo">COMBOX</h1>
    <div class="contact-nav">
      <a href="https://wa.me/584244701273" target="_blank" class="btn-contact"><i class="fab fa-whatsapp"></i> WhatsApp</a>
      <a href="https://www.instagram.com/combox.valencia/" target="_blank" class="btn-contact"><i class="fab fa-instagram"></i> Instagram</a>
    </div>
  </div>

  <div id="filter-bar" class="filter-bar d-none">
    <button class="btn-filter active" onclick="cambiarFiltro('Todas', this)">Todas</button>
  </div>

  <div class="container py-4">
    <div id="grid" class="row g-4"></div>
    <div id="loader">
      <div class="spinner-border text-danger" role="status"></div>
      <p>Cargando productos...</p>
    </div>
  </div>

  <script>
    const TEL = "584244701273"; 
    // TU URL DE APPS SCRIPT (Asegúrate de que el doGet devuelva JSON)
    const API_URL = "https://script.google.com/macros/s/AKfycbwBSKJ8SJCZKLaDC15TLOwo5yq3a8lzkW_VIiCojWTsCCvCz4N_HfDKHDIENibTA6BT/exec";

    let baseTotal = [];
    let itemsFiltrados = [];

    async function cargarDatos() {
      try {
        const response = await fetch(API_URL);
        const productos = await response.json();
        
        baseTotal = productos;
        itemsFiltrados = productos;
        
        document.getElementById('loader').style.display = 'none';
        const filterBar = document.getElementById('filter-bar');
        filterBar.classList.remove('d-none');
        
        const categorias = [...new Set(productos.map(p => p.categoria))].filter(Boolean).sort();
        categorias.forEach(cat => {
          const btn = document.createElement('button');
          btn.className = 'btn-filter';
          btn.innerText = cat;
          btn.onclick = (e) => cambiarFiltro(cat, e.target);
          filterBar.appendChild(btn);
        });
        
        renderizarMas();
      } catch (error) {
        console.error("Error:", error);
        document.getElementById('loader').innerHTML = "Error al conectar con la base de datos.";
      }
    }

    function cambiarFiltro(cat, el) {
      document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      itemsFiltrados = cat === 'Todas' ? baseTotal : baseTotal.filter(p => p.categoria === cat);
      document.getElementById('grid').innerHTML = '';
      renderizarMas();
    }

    function renderizarMas() {
      const grid = document.getElementById('grid');
      const actual = grid.children.length;
      const siguientes = itemsFiltrados.slice(actual, actual + 24);
      
      siguientes.forEach(p => {
        const col = document.createElement('div');
        col.className = 'col-6 col-md-4 col-lg-3';
        col.innerHTML = `
          <div class="card">
            <div class="img-box"><img src="${p.imagen}" alt="${p.nombre}" loading="lazy"></div>
            <div class="product-name">${p.nombre}</div>
            <a href="https://wa.me/${TEL}?text=Hola! Me interesa: ${encodeURIComponent(p.nombre)}" target="_blank" class="btn-pedir">
              <i class="fas fa-shopping-cart"></i><span>COMPRAR</span>
            </a>
          </div>
        `;
        grid.appendChild(col);
      });
    }

    window.onscroll = () => {
      if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 1000) {
        if (grid.children.length < itemsFiltrados.length) renderizarMas();
      }
    };

    window.onload = cargarDatos;
  </script>
</body>
</html>
