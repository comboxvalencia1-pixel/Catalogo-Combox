<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COMBOX | Catálogo V2 Beta</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="splash" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--primary); z-index:9999; display:flex; align-items:center; justify-content:center; transition:0.8s cubic-bezier(0.8,0,0.2,1);">
        <img src="logo.png" style="width:120px; filter:brightness(0) invert(1);">
    </div>

    <header id="mainHeader">
        </header>

    <div id="islandsWrapper" class="islands-wrapper">
        <div class="island-master">
            <div id="search-box" class="search-container">
                <i class="fa fa-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar producto..." oninput="handleSearch()">
                <i class="fa fa-times" onclick="toggleSearch(false)"></i>
            </div>
            <div id="modeContainer" style="display:flex; width:100%; align-items:center;">
                <div class="search-trigger" onclick="toggleSearch(true)"><i class="fa fa-search"></i></div>
                </div>
        </div>
    </div>

    <main id="mainContent" class="container"></main>

    <div id="cartFloating" class="cart-floating" onclick="toggleModal(true)">
        <div style="display:flex; align-items:center; gap:15px;">
            <div class="cart-badge"><i class="fa fa-shopping-basket"></i></div>
            <div>
                <div id="floatCount" style="font-size:0.7rem; font-weight:800; opacity:0.8;">0 PRODUCTOS</div>
                <div id="floatTotal" style="font-size:1.2rem; font-weight:900;">$0.00</div>
            </div>
        </div>
        <i class="fa fa-arrow-right"></i>
    </div>

    <div id="cartModal" class="modal-overlay" onclick="closeModalExterno(event)">
        </div>

    <script src="script.js"></script>
</body>
</html>
