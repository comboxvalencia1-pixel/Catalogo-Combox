<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COMBOX</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>
<body oncontextmenu="return false;">

<div id="splash" aria-hidden="true">
    <img src="logo_white.png" class="pulse-logo" alt="Cargando COMBOX">
</div>

<div id="toastContainer" aria-live="polite"></div>

<header>
    <div class="top-bar">
        <span id="brandName">COMBOX</span> • <span id="currentSedeName">SELECCIONA SEDE</span>
    </div>
    <div class="header-buttons">
        <button onclick="openSedeModal()" aria-label="Seleccionar Sede"><i class="fa-solid fa-shop"></i></button>
        <button onclick="toggleHorarios()" aria-label="Ver Horarios"><i class="fa-solid fa-clock"></i></button>
        <a id="linkWS" target="_blank" aria-label="Contactar por WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
        <a id="linkIG" target="_blank" aria-label="Ir a Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a id="linkMap" target="_blank" aria-label="Ver ubicación en el mapa"><i class="fa-solid fa-location-dot"></i></a>
    </div>
</header>

<div class="island-master">
    <div class="search-bar">
        <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
        <input type="text" id="searchInput" placeholder="Buscar producto..." onkeyup="renderProducts(this.value)" aria-label="Buscar productos">
    </div>
    <div class="type-selector" id="typeButtons" role="tablist"></div>
    <div class="subcategories-pills" id="subcatContainer" role="tablist"></div>
</div>

<div id="promoSection" style="display:none;">
    <h3 class="section-title">Promociones 🔥</h3>
    <div class="carousel" id="promoCarousel" aria-label="Carrusel de promociones"></div>
</div>

<div id="productContainer" aria-live="polite"></div>

<div id="bottomIsland" class="liquid-glass-island" style="display:none;" onclick="openCart()" aria-label="Ver carrito" role="button" tabindex="0">
    <div class="island-cart-info">
        <span class="neon-price" id="cartTotal">$0.00</span>
        <span class="cart-subtitle" id="cartCount">0 productos</span>
    </div>
    <button class="btn-ver-pedido" aria-hidden="true">Ver Pedido</button>
</div>

<div id="cartModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="cartTitle">
    <div class="modal-card">
        <div class="modal-header">
            <h3 id="cartTitle">TU PEDIDO</h3>
            <button class="close-btn" onclick="closeModal('cartModal')" aria-label="Cerrar carrito"><i class="fa-solid fa-circle-xmark"></i></button>
        </div>
        <div class="cart-items-container" id="cartItemsList"></div>
        <div class="cart-footer">
            <div class="subtotal-row"><span>Total a Pagar:</span><span class="red-total" id="modalTotal">$0.00</span></div>
            <button class="btn-confirm" onclick="showDeliveryOptions()">CONTINUAR</button>
            <button class="btn-empty" onclick="clearCart()">Vaciar Carrito</button>
        </div>
    </div>
</div>

<div id="deliveryModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="deliveryTitle">
    <div class="modal-card">
        <div class="modal-header">
            <button class="back-btn" onclick="backToCart()" aria-label="Volver al carrito"><i class="fa-solid fa-arrow-left"></i></button>
            <h3 id="deliveryTitle">ENTREGA</h3>
        </div>
        <div class="delivery-options">
            <button id="btnStore" class="delivery-btn active" onclick="selectMethod('tienda')" aria-pressed="true"><i class="fa-solid fa-shop"></i> Recoger en tienda</button>
            <button id="btnDelivery" class="delivery-btn" onclick="selectMethod('delivery')" aria-pressed="false"><i class="fa-solid fa-motorcycle"></i> Delivery</button>
        </div>
        
        <div id="deliveryFields" class="form-fields">
            <div id="storeInfo">
                <p>Predeterminado: <b id="currentSedeNameModal">Sede</b></p>
                <input type="text" id="clientName" placeholder="Tu nombre" aria-label="Nombre del cliente">
            </div>
            <div id="deliveryInfo" style="display:none;">
                <div class="gps-input-group">
                    <button class="btn-gps" onclick="getLocation()" aria-label="Obtener ubicación actual"><i class="fa-solid fa-location-crosshairs"></i> Aquí</button>
                    <input type="url" id="locationLink" placeholder="Link de Google Maps válido" aria-label="Enlace de ubicación">
                </div>
                <small id="urlError" style="color:var(--primary); display:none; margin-bottom:10px;">Ingresa un enlace válido (ej. https://maps...)</small>
                <input type="text" id="receiverName" placeholder="Nombre de quien recibe" aria-label="Nombre del receptor">
            </div>
        </div>
        <button id="btnWhatsApp" class="btn-final-wa" disabled onclick="finalizarPedido()">PEDIR POR WHATSAPP</button>
    </div>
</div>

<div id="sedeModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="sedeTitle">
    <div class="modal-card">
        <div class="modal-header">
            <h3 id="sedeTitle">SELECCIONA UNA SEDE</h3>
            <button class="close-btn" onclick="closeModal('sedeModal')" aria-label="Cerrar modal de sedes"><i class="fa-solid fa-circle-xmark"></i></button>
        </div>
        <div id="sedeList" class="sede-list"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
