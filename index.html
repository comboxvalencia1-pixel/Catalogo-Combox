<style type="text/tailwindcss">
        :root { 
            --primary: #E30613; 
            --glass: rgba(18, 18, 20, 0.75); 
            --neon: #39FF14;
            --glass-bg: rgba(20, 20, 22, 0.65);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-shine: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.05) 100%);
        }
        
        /* Native App Restrictions */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }
        
        body { 
            background: #050505; 
            color: #F4F4F5; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            touch-action: manipulation; 
            overflow-x: hidden; 
            font-style: normal; 
        }

        body.modal-open {
            overflow: hidden !important;
        }

        #splash { position: fixed; inset: 0; background: var(--primary); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: all 0.6s ease; }
        .pulse-logo { font-weight: 900; font-size: 3.75rem; color: white; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; font-style: normal; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        
        .unified-island {
            background: var(--glass-bg);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border: 0.5px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: 
                inset 0 1px 1px rgba(255,255,255,0.12),
                inset 0 -1px 2px rgba(0,0,0,0.5),
                0 15px 35px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        /* Island Search Scroll Behavior */
        #search-container {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }
        .search-hidden {
            transform: translateY(-120%) !important;
        }

        .image-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            background: rgba(255,255,255,0.03);
            pointer-events: none; 
        }
        .placeholder-blur {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: blur(12px);
            transform: scale(1.1);
            opacity: 1;
            transition: opacity 0.5s ease-in-out;
            z-index: 1;
        }
        .main-image {
            position: relative;
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            z-index: 2;
        }
        .main-image.loaded {
            opacity: 1;
        }
        .main-image.loaded + .placeholder-blur {
            opacity: 0;
        }
        .liquid-glass {
            background: rgba(25, 25, 28, 0.4); 
            backdrop-filter: blur(20px) saturate(160%); 
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 0.5px solid var(--glass-border); 
            position: relative;
            box-shadow: 
                inset 0 1px 1px rgba(255,255,255,0.08),
                inset 0 -1px 2px rgba(0,0,0,0.3);
        }
        .search-inner-island {
            width: 44px;
            height: 44px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.05);
            border-radius: 99px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .search-inner-island.expanded {
            width: 100%;
            background: rgba(0,0,0,0.2);
        }
        .nav-btn-glass {
            background: rgba(30, 30, 35, 0.5);
            backdrop-filter: blur(16px) saturate(140%);
            -webkit-backdrop-filter: blur(16px) saturate(140%);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                inset 0 1px 2px rgba(255, 255, 255, 0.05),
                inset 0 -1px 2px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-btn-active { 
            background: rgba(45, 45, 50, 0.7) !important;
            border: 0.5px solid rgba(255, 255, 255, 0.2) !important;
            box-shadow: 
                inset 0 1px 4px rgba(255, 255, 255, 0.1),
                inset 0 -2px 6px rgba(0, 0, 0, 0.5),
                0 12px 24px rgba(0,0,0,0.4) !important;
        }
        .product-card-glass {
            position: relative;
            overflow: hidden;
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }
        .bg-blur-image {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: blur(30px) brightness(0.65);
            transform: scale(1.3);
            z-index: 0;
            opacity: 0.7;
        }
        .glass-overlay {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.75rem;
        }
        .price-pill { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15); 
            color: white; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }
        .price-pill.active { background: #ff0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); border-color: rgba(255, 255, 255, 0.3); }
        .count-badge { position: absolute; top: -8px; right: -8px; background: white; color: black; font-size: 9px; font-weight: 900; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.4); z-index: 40; pointer-events: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        #order-island { transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .order-island-hidden { transform: translate(-50%, 160px) !important; }
        .out-of-stock { grayscale: 1; opacity: 0.6; }
        
        #sedes-modal, #categories-modal, #cart-modal {
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), backdrop-filter 0.4s cubic-bezier(0.4, 0, 0.2, 1), -webkit-backdrop-filter 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none; 
            opacity: 0; 
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
        }
        #sedes-modal.active, #categories-modal.active, #cart-modal.active {
            pointer-events: auto; 
            opacity: 1; 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        
        #sedes-content, #categories-content, #cart-content { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #sedes-modal.active #sedes-content, #categories-modal.active #categories-content, #cart-modal.active #cart-content { transform: translateY(0); }
        
        .modal-overlay { background: rgba(0, 0, 0, 0.6); }
        
        .type-tab { @apply flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all duration-300; }
        .type-tab-active { @apply bg-primary text-white shadow-lg; }
        .type-tab-inactive { @apply text-zinc-400; }
        .cat-menu-btn { @apply w-10 h-10 flex-shrink-0 flex items-center justify-center text-white/70 active:scale-90 transition-transform; }

        /* Skeleton Animations */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Responsive constraints for larger screens */
        @media (min-width: 768px) {
            .max-content-width {
                max-width: 1200px;
                margin-left: auto;
                margin-right: auto;
            }
            .island-width {
                max-width: 600px;
                margin-left: auto !important;
                margin-right: auto !important;
            }
        }
    </style>
</head>

<button class="w-full flex items-center justify-between p-5 rounded-3xl bg-white/5 border border-white/10 active:bg-white/10 transition-colors" onclick="selectLocation('Naguanagua')">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-2xl bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">location_on</span>
</div>
<div class="text-left">
<span class="block text-white font-bold text-lg leading-tight">Naguanagua</span>
<span class="text-[10px] text-zinc-400 uppercase font-black tracking-widest">Sede Principal</span>
</div>
</div>
<div class="flex flex-col items-end gap-1">
<div class="flex items-center gap-1.5 bg-neon-accent/10 px-2.5 py-1 rounded-full border border-neon-accent/20">
<span class="w-1.5 h-1.5 rounded-full bg-neon-accent shadow-[0_0_8px_#39FF14]"></span>
<span class="text-[9px] font-black text-neon-accent uppercase tracking-tighter">Abierto</span>
</div>
<span class="text-[8px] text-zinc-500 font-bold uppercase">Cierra 8:30 PM</span>
</div>
</button>
<button class="w-full flex items-center justify-between p-5 rounded-3xl bg-white/5 border border-white/10 active:bg-white/10 transition-colors" onclick="selectLocation('San Diego')">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-2xl bg-white/10 flex items-center justify-center text-white/40">
<span class="material-symbols-outlined">location_on</span>
</div>
<div class="text-left">
<span class="block text-white font-bold text-lg leading-tight">San Diego</span>
<span class="text-[10px] text-zinc-400 uppercase font-black tracking-widest">Remanso</span>
</div>
</div>
<div class="flex flex-col items-end gap-1">
<div class="flex items-center gap-1.5 bg-red-500/10 px-2.5 py-1 rounded-full border border-red-500/20">
<span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>
<span class="text-[9px] font-black text-red-500 uppercase tracking-tighter">Cerrado</span>
</div>
<span class="text-[8px] text-zinc-500 font-bold uppercase">Abre 11:00 AM</span>
</div>
</button>
</div>
</div>
</div>
<!-- Modal Categorías -->
<div class="fixed inset-0 z-[210] flex items-end" id="categories-modal">
<div class="modal-overlay absolute inset-0" onclick="toggleCategoriesModal(false)"></div>
<div class="relative w-full liquid-glass rounded-t-[40px] px-6 pt-4 pb-12 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t border-white/20 md:max-w-xl md:mx-auto md:rounded-b-[40px] md:mb-10 md:top-1/2 md:bottom-auto md:-translate-y-1/2" id="categories-content">
<div class="flex justify-center mb-8">
<div class="w-12 h-1.5 bg-white/20 rounded-full"></div>
</div>
<div class="flex items-center gap-3 mb-8">
<div class="w-1.5 h-6 bg-primary rounded-full"></div>
<h2 class="text-2xl font-black text-white uppercase tracking-tighter">Categorías</h2>
</div>
<div class="grid grid-cols-2 md:grid-cols-3 gap-3" id="all-categories-list">
</div>
</div>
</div>
<script>
    const API = 'https://script.google.com/macros/s/AKfycbxt4I8HryQUlUkgpdWj0onzS-T7jPwxCy9sbt4FSF-H8UWbRHWNr999RFbDavf5cU7Wxg/exec';
    let db = null;
    let cart = {};
    let currentType = '9cf5db87';
    let currentCat = 'TODOS';
    let currentLocation = 'Naguanagua';
    
    // Scroll handling for search island
    let lastScrollY = window.scrollY;
    const searchContainer = document.getElementById('search-container');
    
    window.addEventListener('scroll', () => {
        if (document.body.classList.contains('modal-open')) return;
        const currentScrollY = window.scrollY;
        if (currentScrollY > 100) {
            if (currentScrollY > lastScrollY) {
                searchContainer.classList.add('search-hidden');
            } else {
                searchContainer.classList.remove('search-hidden');
            }
        } else {
            searchContainer.classList.remove('search-hidden');
        }
        lastScrollY = currentScrollY;
    }, { passive: true });

    async function init() {
        setTimeout(() => {
            const s = document.getElementById('splash');
            if(s) {
                s.style.opacity = '0';
                setTimeout(() => s.remove(), 600);
            }
        }, 1200);
        try {
            const res = await fetch(API);
            db = await res.json();
            render();
        } catch (e) {
            console.error("Error loading data", e);
        }
    }

    function lockScroll(lock) {
        if (lock) {
            document.body.classList.add('modal-open');
        } else {
            document.body.classList.remove('modal-open');
        }
    }

    function toggleSearch() {
        const island = document.getElementById('search-island');
        const tabs = document.getElementById('type-tabs-container');
        const subRow = document.getElementById('subcategory-row');
        const input = document.getElementById('global-search');
        island.classList.toggle('expanded');
        if(island.classList.contains('expanded')) {
            tabs.style.opacity = '0';
            tabs.style.pointerEvents = 'none';
            subRow.style.opacity = '0';
            subRow.style.pointerEvents = 'none';
            setTimeout(() => {
                tabs.classList.add('hidden');
                subRow.classList.add('hidden');
                input.focus();
            }, 300);
        } else {
            tabs.classList.remove('hidden');
            subRow.classList.remove('hidden');
            setTimeout(() => {
                tabs.style.opacity = '1';
                tabs.style.pointerEvents = 'auto';
                subRow.style.opacity = '1';
                subRow.style.pointerEvents = 'auto';
            }, 10);
            input.value = '';
            render();
        }
    }

    function toggleSedesModal(show) {
        const modal = document.getElementById('sedes-modal');
        if(show) modal.classList.add('active');
        else modal.classList.remove('active');
        lockScroll(show);
    }

    function toggleCategoriesModal(show) {
        const modal = document.getElementById('categories-modal');
        if(show) {
            renderAllCategories();
            modal.classList.add('active');
        } else {
            modal.classList.remove('active');
        }
        lockScroll(show);
    }

    function toggleCartModal(show) {
        const modal = document.getElementById('cart-modal');
        if(show) {
            renderCart();
            modal.classList.add('active');
        } else {
            modal.classList.remove('active');
        }
        lockScroll(show);
    }

    function selectLocation(name) {
        currentLocation = name;
        document.getElementById('current-location-label').innerText = name;
        if(window.navigator.vibrate) window.navigator.vibrate(15);
        toggleSedesModal(false);
    }

    function render() {
        if(!db) return;
        renderCategories();
        renderPromos();
        renderCatalog();
    }

    function renderCategories() {
        const nav = document.getElementById('cat-pills');
        const items = db.catalogo.filter(p => p.tipo_id === currentType);
        const cats = ['TODOS', ...new Set(items.map(p => p.categoria_nombre))];
        nav.innerHTML = cats.map(c => `
            <button onclick="setCat('${c}')" class="px-5 h-8 rounded-lg text-[9px] font-black uppercase whitespace-nowrap transition-all ${currentCat === c ? 'bg-primary text-white shadow-lg' : 'text-zinc-400'}">${c}</button>
        `).join('');
    }

    function renderAllCategories() {
        const list = document.getElementById('all-categories-list');
        const items = db.catalogo.filter(p => p.tipo_id === currentType);
        const cats = ['TODOS', ...new Set(items.map(p => p.categoria_nombre))];
        list.innerHTML = cats.map(c => `
            <button onclick="setCat('${c}'); toggleCategoriesModal(false)" class="w-full py-4 rounded-2xl text-[10px] font-black uppercase border transition-all ${currentCat === c ? 'bg-primary text-white border-primary shadow-lg shadow-primary/20' : 'bg-white/5 text-zinc-400 border-white/10'}">${c}</button>
        `).join('');
    }

    function renderPromos() {
        const grid = document.getElementById('promo-carousel');
        const section = document.getElementById('promo-section');
        const today = new Date();
        const dayNames = ["Domingo", "Lunes", "Martes", "Miercoles", "Jueves", "Viernes", "Sabado"];
        const currentDay = dayNames[today.getDay()];
        const promos = db.catalogo.filter(p => {
            const dateOk = p.promocion.hasta ? new Date(p.promocion.hasta) >= today : true;
            const dayOk = p.promocion.dias.includes(currentDay) || p.promocion.dias.includes("Todos Los Dias");
            return p.promocion.activa && dateOk && dayOk;
        });
        if(promos.length > 0) {
            section.classList.remove('hidden');
            grid.innerHTML = promos.map(p => createCard(p, true)).join('');
        } else {
            section.classList.add('hidden');
        }
    }

    function renderCatalog() {
        const container = document.getElementById('catalog-grid');
        const search = document.getElementById('global-search').value.toLowerCase();
        let items = db.catalogo.filter(p => p.tipo_id === currentType);
        if(currentCat !== 'TODOS') items = items.filter(p => p.categoria_nombre === currentCat);
        if(search) items = items.filter(p => p.nombre.toLowerCase().includes(search));
        const grouped = items.reduce((acc, p) => {
            acc[p.categoria_nombre] = acc[p.categoria_nombre] || [];
            acc[p.categoria_nombre].push(p);
            return acc;
        }, {});
        container.innerHTML = Object.entries(grouped).map(([cat, products]) => `
            <div>
                <div class="flex items-center mb-6 px-1">
                    <div class="flex items-center gap-3">
                        <div class="w-1.5 h-6 bg-primary rounded-full"></div>
                        <h2 class="text-xl font-black text-white uppercase tracking-tight">${cat}</h2>
                    </div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                    ${products.map(p => createCard(p)).join('')}
                </div>
            </div>
        `).join('');
    }

    function createCard(p, isPromoCard = false) {
        const count = cart[p.id] || 0;
        const isOut = p.status === 'OUT_OF_STOCK';
        let precio = p.precios.normal;
        if(p.promocion.activa) precio = p.precios.promo;
        
        const cardClass = isPromoCard ? 'min-w-[calc(50%-8px)] md:min-w-[calc(33.333%-11px)] lg:min-w-[calc(25%-12px)] snap-start' : '';
        const imgUrl = p.imagen || 'https://via.placeholder.com/300/111/fff?text=COMBOX';
        
        return `
            <div class="product-card-glass ${isOut ? 'out-of-stock' : ''} ${cardClass}" id="card-${p.id}" data-id="${p.id}">
                <div class="bg-blur-image" style="background-image: url('${imgUrl}')"></div>
                <div class="glass-overlay">
                    ${p.promocion.activa ? '<div class="absolute top-3 right-3 bg-black/80 px-2 py-1 rounded-full text-[8px] font-black text-white backdrop-blur-md border border-white/20 z-30">PROMO 🔥</div>' : ''}
                    <div class="w-full aspect-square rounded-2xl overflow-hidden mb-3 relative flex items-center justify-center image-container">
                        <img class="main-image" src="${imgUrl}" onload="this.classList.add('loaded')" loading="lazy" oncontextmenu="return false;"/>
                        <img class="placeholder-blur" src="${imgUrl}" aria-hidden="true" />
                    </div>
                    <h3 class="font-bold mb-1 tracking-tight text-white uppercase text-center w-full text-[10px] md:text-xs h-6 md:h-8 line-clamp-2 leading-tight">${p.nombre}</h3>
                    <div class="flex justify-center w-full mt-3 relative btn-action-area">
                        ${count > 0 ? `<div class="count-badge">${count}</div>` : ''}
                        <button onclick="add('${p.id}')" ${isOut ? 'disabled' : ''} class="price-pill w-full py-2.5 md:py-3 rounded-full text-[11px] md:text-xs font-bold ${count > 0 ? 'active' : ''}">
                            ${isOut ? 'SIN STOCK' : '$' + precio.toFixed(2)}
                        </button>
                    </div>
                </div>
            </div>
        `;
    }

    function renderCart() {
        const list = document.getElementById('cart-items-list');
        const items = Object.keys(cart).map(id => {
            const p = db.catalogo.find(x => x.id === id);
            return { ...p, qty: cart[id] };
        }).filter(p => p.qty > 0);

        if(items.length === 0) {
            list.innerHTML = `
                <div class="flex flex-col items-center justify-center py-20 text-zinc-600">
                    <span class="material-symbols-outlined text-6xl mb-4">shopping_basket</span>
                    <p class="font-black uppercase tracking-widest text-[10px]">Carrito vacío</p>
                </div>
            `;
            return;
        }

        list.innerHTML = items.map(p => {
            let price = p.promocion.activa ? p.precios.promo : p.precios.normal;
            return `
                <div class="flex items-center justify-between bg-white/5 p-4 rounded-3xl border border-white/10 gap-3">
                    <div class="flex items-center gap-4 flex-1">
                        <div class="w-16 h-16 rounded-2xl overflow-hidden bg-white/5 flex-shrink-0">
                            <img src="${p.imagen}" class="w-full h-full object-cover">
                        </div>
                        <div class="flex flex-col min-w-0">
                            <span class="text-base font-[800] text-white uppercase leading-tight line-clamp-2">${p.nombre}</span>
                            <span class="text-sm text-primary font-black tracking-wider mt-0.5">$${price.toFixed(2)} c/u</span>
                        </div>
                    </div>
                    <div class="flex items-center bg-black/40 rounded-full p-1 border border-white/10 flex-shrink-0">
                        <button onclick="changeQty('${p.id}', -1)" class="w-8 h-8 rounded-full flex items-center justify-center text-white active:scale-90 transition-transform">
                            <span class="material-symbols-outlined text-sm">remove</span>
                        </button>
                        <span class="px-2 text-xs font-black text-white w-6 text-center">${p.qty}</span>
                        <button onclick="changeQty('${p.id}', 1)" class="w-8 h-8 rounded-full flex items-center justify-center text-white active:scale-90 transition-transform">
                            <span class="material-symbols-outlined text-sm">add</span>
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function changeQty(id, delta) {
        cart[id] = Math.max(0, (cart[id] || 0) + delta);
        if(cart[id] === 0) delete cart[id];
        if(window.navigator.vibrate) window.navigator.vibrate(10);
        updateOrder();
        renderCart();
        syncCardBadge(id); // Target specific element update
    }

    function syncCardBadge(id) {
        const count = cart[id] || 0;
        document.querySelectorAll(`[data-id="${id}"]`).forEach(card => {
            const badge = card.querySelector('.count-badge');
            const pill = card.querySelector('.price-pill');
            
            if (count > 0) {
                if (badge) {
                    badge.innerText = count;
                } else {
                    const actionArea = card.querySelector('.btn-action-area');
                    actionArea.insertAdjacentHTML('afterbegin', `<div class="count-badge">${count}</div>`);
                }
                if (pill) pill.classList.add('active');
            } else {
                if (badge) badge.remove();
                if (pill) pill.classList.remove('active');
            }
        });
    }

    function clearCart() {
        if(confirm('¿Estás seguro de vaciar tu pedido?')) {
            const oldIds = Object.keys(cart);
            cart = {};
            updateOrder();
            toggleCartModal(false);
            oldIds.forEach(id => syncCardBadge(id));
        }
    }

    function add(id) {
        cart[id] = (cart[id] || 0) + 1;
        if(window.navigator.vibrate) window.navigator.vibrate(20);
        updateOrder();
        syncCardBadge(id); // Optimized DOM update
    }

    function updateOrder() {
        let total = 0;
        let itemsCount = 0;
        Object.keys(cart).forEach(id => {
            const p = db.catalogo.find(x => x.id === id);
            if(!p) return;
            let price = p.promocion.activa ? p.precios.promo : p.precios.normal;
            total += price * cart[id];
            itemsCount += cart[id];
        });
        document.getElementById('order-total').innerText = `$${total.toFixed(2)}`;
        document.getElementById('cart-subtotal').innerText = `$${total.toFixed(2)}`;
        const island = document.getElementById('order-island');
        if(itemsCount > 0) {
            island.classList.remove('order-island-hidden');
        } else {
            island.classList.add('order-island-hidden');
            if (document.getElementById('cart-modal').classList.contains('active')) {
                toggleCartModal(false);
            }
        }
    }

    function setType(id, btn) {
        currentType = id; 
        currentCat = 'TODOS';
        document.querySelectorAll('.type-tab').forEach(b => {
            b.classList.remove('type-tab-active');
            b.classList.add('type-tab-inactive');
        });
        btn.classList.add('type-tab-active');
        btn.classList.remove('type-tab-inactive');
        render();
    }

    function setCat(c) { 
        currentCat = c; 
        render(); 
    }

    function sendWhatsApp() {
        let msg = `*NUEVO PEDIDO COMBOX - Sede: ${currentLocation}*\n--------------------------\n`;
        let total = 0;
        Object.keys(cart).forEach(id => {
            const p = db.catalogo.find(x => x.id === id);
            if(!p) return;
            let price = p.promocion.activa ? p.precios.promo : p.precios.normal;
            msg += `• ${cart[id]}x ${p.nombre.toUpperCase()} ($${(price * cart[id]).toFixed(2)})\n`;
            total += price * cart[id];
        });
        msg += `--------------------------\n*TOTAL:* $${total.toFixed(2)}`;
        window.open(`https://wa.me/584244701273?text=${encodeURIComponent(msg)}`);
    }
    
    init();
</script>
